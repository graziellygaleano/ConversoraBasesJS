<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Base</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">
        <h1>Conversora de Base</h1>

        <div class="container-forms">
            <form id="formConversorBase">
                <input name="numeroConversao" type="number" min="0" placeholder="Insira um decimal" required>
                <select name="baseConversao" id="baseConversao">
                    <option value="" disabled selected>Selecione uma base...</option>
                    <option value="binario">Binário</option>
                </select>
                <button type="submit">Enviar</button>
            </form>
        </div>
        <button id="botaoApagar" type="button">Apagar histórico</button>
    </div>


    <p id="numeroConvertido"></p>

    <div id="historico">
        <h1 id="tituloHistorico"></h1>
        <ul id="historicoLista"></ul>
    </div>



    <script type="module" src="./gerenciaForms.js"></script>
</body>

</html>

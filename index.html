<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Base</title>
    <link rel="stylesheet" href="css/resetCSS.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">
        <h1 id="titulo-pagina">Conversora de Base</h1>

        <div class="container-forms">
            <form id="formConversorBase">
                <div class="perguntas-form">
                    <input class="pergunta" name="numeroConversao" type="number" min="0" placeholder="Insira um decimal"
                        required>
                    <select class="pergunta" name="baseConversao" id="baseConversao">
                        <option value="" disabled selected>Selecione uma base...</option>
                        <option value="binario">Binário</option>
                    </select>
                </div>
                <div class="botoes">
                    <button class="botao" type="submit">Enviar</button>
                    <button class="botao" type="button" id="botaoApagar" type="button">Apagar histórico</button>
                </div>

            </form>
        </div>

        <p id="numeroConvertido"></p>


        <div id="historico">
            <h1 id="tituloHistorico"></h1>
            <ul id="historicoLista"></ul>
        </div>
    </div>







    <script type="module" src="./gerenciaForms.js"></script>
</body>

</html>
